<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portofolio Keisha Aurel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor-glow"></div>
    
    <header>
        <nav>
            <h1>Portfolio | Keisha Aurel</h1>
            <div class="pinky">☰</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>

                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2 class="page-title">Hubungi Saya</h2>
            
            <div class="contact-content scroll-reveal">
                <p style="margin-bottom: 2rem; color: #64748b;">Silakan kirim pesan jika ingin berkolaborasi atau sekadar menyapa.</p>
                <form id="contactForm">
                    <label>Nama Lengkap:</label>
                    <input type="text" id="nama" placeholder="Masukkan nama">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="Masukkan email">
                    <label>Pesan:</label>
                    <textarea id="pesan" rows="5" placeholder="Tulis pesan di sini"></textarea>
                    <button type="submit" class="btn btn-primary form-btn">Kirim Pesan</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        &copy; <span class="copyright-year">2026</span> Keisha Aurel. Tugas UTP Pemrograman Web.
    </footer>
    
    <script src="js/script.js"></script>
